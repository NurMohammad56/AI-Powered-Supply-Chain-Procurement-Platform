services:
  redis:
    image: redis:7-alpine
    container_name: scp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scp-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scp-worker
    restart: unless-stopped
    healthcheck:
      disable: true
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    command: ["node", "dist/worker.js"]

volumes:
  redis_data:
